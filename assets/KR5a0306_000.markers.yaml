  - {type: variant, offset: 3, length: 2, content: 赤松, WYG: 至𤣥俗凡七十一人人係以讃篇末又為總讃一首其體全仿列女𫝊陳振孫書録解題以為不𩔖西漢文字必非向撰黄伯思東觀餘論謂是書雖非向筆而事詳語約詞㫖明潤疑東京人作今考是書隋志著録則出于梁前又葛洪神仙𫝊序亦稱此書為向作則晉時巳有其本然漢志列劉向序六十七篇但有新序説苑世說列女𫝊圖頌無列仙𫝊之名又漢志所録皆因七畧其總讃引孝經援神契為漢志所不載涓}
  - {type: page-break, offset: 3, content: '', id: KR5a0306_WYG_000-1b, image: WYG1058/WYG1058-0487b.png}
  - {type: variant, offset: 6, length: 37, content: 者神農時雨師也服水玉以教神農能入火自燒往往至崑崙山上常止西王母石室中隨風雨, WYG: 𫝊稱其琴心三篇有條理與漢志涓子十三篇不合老子𫝊稱作道徳經}
