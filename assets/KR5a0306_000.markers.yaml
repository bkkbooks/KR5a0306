  - {type: variant, offset: 48, length: 2, content: 女追, WYG: 一卷又劉義慶世説新語載孫綽作商丘子胥讚曰所牧何物殆非真豬儻遇風雲為我龍攄此本商丘子胥讚亦無此語然則此本}
