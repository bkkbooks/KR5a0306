  - {type: variant, offset: 45, length: 2, content: 炎帝, WYG: 二篇與漢志但稱老子亦不合均不應自相違異或魏晉間方士為之託名于向振孫又云館閣書目作三卷六十一人中興書目作二卷七十二人李石續博物志亦云劉向𫝊列仙七十二人皆與此本小異惟葛洪神𫝊傳序稱七十一人此本上卷四十人下卷三十人内江婓二女應作二人與洪所記適合檢李善文選註及唐初藝文𩔖聚諸書所引文亦相符當為舊本其篇末之讚今槩以為向作考隋志載列仙𫝊讚二卷劉向撰晉郭元祖讚又孫綽讚三卷此本二卷校孫綽所讚}
