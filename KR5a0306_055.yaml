body:
  text: 服閭服閭者不知何所人也常止莒往來海邊諸祠中有三仙人於祠中博賭瓜雇閭令擔黃白瓜數十頭教令瞑目及覺乃在方丈山在蓬萊山南後往來莒取方丈山上珍寶珠玉賣之久矣一旦髡頭著赭衣貌更老人問之言坐取廟中物云後數年貌更壯好鬢髮如往日時矣服閭遊祠三仙是使假寐須臾忽超千里納寶毀形未足多恥攀龍附鳳逍遙終始
