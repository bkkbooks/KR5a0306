body:
  text: 安期先生安期先生者琅琊阜鄉人也賣藥於東海邊時人皆言千歲翁秦始皇東遊請見與語三日三夜賜金璧度數千萬出於阜鄉亭皆置去留書以赤玉舄一雙為報曰後數年求我於蓬萊山始皇即遣使者徐市盧生等數百人入海未至蓬萊山輒逢風波而還立祠阜鄉亭海邊十數處云寥寥安期虛質高清乘光適性保氣延生聊悟秦始遺寶阜亭將游蓬萊絶影清泠
