body:
  text: 毛女毛女者字玉薑在華陰山中獵師世世見之形體生毛自言秦始皇宮人也秦壞流亡入山避難遇道士谷春教食松葉遂不飢寒身輕如飛百七十餘年所居岩中有鼓琴聲云婉孌玉薑與時遁逸真人授方餐松秀實因敗獲成延命深吉得意岩岫寄歡琴瑟
