body:
  text: 赤鬚子赤鬚子豐人也豐中傳世見之云秦穆公時主魚吏也數道豐界災害水旱十不失一臣下歸向迎而師之從受業問所長好食松實天門冬石脂齒落更生髮墮再出服霞絶後遂去吳山下十餘年莫知所之赤鬚去豐爰憩吳山三藥並御朽貌再鮮空往師之而無使延顧問小智豈識巨年
