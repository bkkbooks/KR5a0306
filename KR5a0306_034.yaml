body:
  text: 簫史簫史者秦穆公時人也善吹簫能致孔雀白鶴於庭穆公有女字弄玉好之公遂以女妻焉日教弄玉作鳳鳴居數年吹似鳳聲鳳凰來止其屋公為作鳳台夫婦止其上不下數年一旦皆隨鳳凰飛去故秦人為作鳳女祠於雍宮中時有簫聲而已簫史妙吹鳳雀舞庭嬴氏好合乃習鳳聲遂攀鳳翼參翥高冥女祠寄想遺音載清
