body:
  text: 騎龍鳴騎龍鳴者渾亭人也年二十於池中求得龍子狀如守宮者十餘頭養食結草廬而守之龍長大稍稍而去後五十餘年水壞其廬而去一旦騎龍來渾亭下語云馮伯昌孫也此間人不去五百里必當死信者皆去不信者以為妖至八月果水至死者萬計騎鳴養龍結廬虛池專至俟化乘雲驂螭紆轡故鄉告以速移洞鏡災祥情眷不離
