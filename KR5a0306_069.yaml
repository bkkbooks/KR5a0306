body:
  text: 玄俗玄俗者自言河間人也餌巴豆賣藥都市七丸一錢治百病河間王病瘕買藥服之下蛇十餘頭問藥意俗云王瘕乃六世餘殃下墮即非王所招也王常放乳鹿憐母也仁心感天故當遭俗耳王家老舍人自言父世見俗俗形無影王乃呼俗日中看實無影王欲以女配之俗夜亡去後人見於常山下質虛影滅時惟玄俗布德神丸乃寄鹿贖道發河間親寵方渥騰龍不制超然絶足贊曰易稱太極是生兩儀兩儀生然後有人民有人民然後有生死生死之義著明矣蓋萬物施張渾爾而就亦無所不備焉神矣妙矣精矣微矣其事不可得一一論也聖人仰則觀法於天俯則觀法於地日月運行四時分治五星受制於太微監無道之國吉凶預見以戒王者動靜言語應效相通有自來矣天雖不言然其變化云為不可謂之無也周書序桑問涓子曰有死亡而復云有神仙者事兩成邪涓子曰言固可兩有耳孝經援神契言不過天地造靈洞虛猶立五嶽設三台陽精主外陰精主內精氣上下經緯人物道治非一若夫草木皆春生秋落必矣而木有松柏橿檀之倫百八十餘種草有芝英萍實靈沼黃精白符竹戒火長生不死者萬數盛冬之時經霜歷雪蔚而不凋見斯其類也何怪於有仙邪余嘗得秦大夫阮倉撰仙圖自六代迄今有七百餘人始皇好遊仙之事庶幾有獲故方士霧集祈祀彌布殆必因跡托虛寄空為實不可信用也若周公黃録記太白下為王公然歲星變為寧壽公等所見非一家聖人所以不開其事者以其無常然雖有時著蓋道不可棄距而閉之尚貞正也而論語云怪力亂神其微旨可知矣
