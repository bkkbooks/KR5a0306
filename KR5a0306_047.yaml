body:
  text: 鹿皮公鹿皮公者淄川人也少為府小吏木工舉手能成器械岑山上有神泉人不能至也小吏白府君請木工斤斧三十人作轉輪懸閣意思橫生數十日梯道四間成上其巔作祠舍留止其旁絕其二間以自固食芝草飲神泉且七十年淄水來三下呼宗族家室得六十餘人令上山半水盡漂一郡沒者萬計小吏乃辭遣宗家令下山著鹿皮衣遂去復上閣後百餘年下賣藥於市皮公興思妙巧纏綿飛閣懸趣上揖神泉肅肅清廟二間愔愔可以閒處可以永年
