body:
  text: 寇先寇先者宋人也以釣魚為業居睢水旁百餘年得魚或放或賣或自食之常著冠帶好種荔枝食其葩實焉宋景公問其道不告即殺之數十年踞宋城門鼓琴數十日乃去宋人家家奉祀之寇先惜道術不虛傳景公戮之尸解神遷歷載五十撫琴來旋夷俟宋門暢意五弦
