body:
  text: 朱仲朱仲者會稽人也常於會稽市上販珠漢高後時下書募三寸珠仲讀購書笑曰直值汝矣齎三寸珠詣闕上書珠好過度即賜五百金魯元公主復私以七百金從仲購珠仲獻四寸珠送置於闕即去下書會稽徵聘不知所在景帝時復來獻三寸珠數十枚輒去不知所之云朱仲無欲聊寄賈商俯窺驪龍捫此夜光發迹會稽曜奇咸陽施而不德歷世彌彰
