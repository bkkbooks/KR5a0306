body:
  text: 彭祖彭祖者殷大夫也姓籛名鏗帝顓頊之孫陸終氏之中子歷夏至殷末八百餘歲常食佳芝善導引行氣歷陽有彭祖仙室前世禱請風雨莫不輒應常有兩虎在祠左右祠訖地即有虎跡雲後升仙而去遐哉碩仙時唯彭祖道與化新綿綿歷古隱倫玄室靈著風雨二虎嘯時莫我猜侮
