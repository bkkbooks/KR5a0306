body:
  text: 任光任光者上蔡人也善餌丹賣於都市里間積八十九年乃知是故時任光也皆説如數十歲面顏後長老識之趙簡子聘與俱歸常在桓梯山上三世不知所在晉人常服其丹也上蔡任光能煉神丹年涉期頤曄爾朱顏頃適趙子縱任所安升軌桓梯高飛雲端
