body:
  text: 商丘子胥商丘子胥者高邑人也好牧豕吹竽年七十不娶婦而不老邑人多奇之從受道問其要言但食朮菖蒲根飲水不饑不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終歲輒止慢矣謂將復有匿術也商丘幽棲韞櫝妙術渴飲寒泉饑茹蒲朮吹竽牧豕卓犖奇出道足無求樂茲永日
