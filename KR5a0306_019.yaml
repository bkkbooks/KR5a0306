body:
  text: 馬丹馬丹者晉耿之人也當文侯時為大夫至獻公時復為幕府正獻公滅耿殺恭太子丹乃去至趙宣子時乘安車入晉都候諸大夫靈公欲仕之逼不以禮有迅風發屋丹入回風中而去北方人尊而祠之馬丹官晉與時汙隆事文去獻顯沒不窮密網將設從禮迅風杳然獨上絶迹玄宮
