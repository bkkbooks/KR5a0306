body:
  text: 王子喬王子喬者周靈王太子晉也好吹笙作鳳凰鳴游伊洛之間道士浮丘公接以上嵩高山三十餘年後求之於山上見桓良曰告我家七月七日待我於緱氏山巔至時果乘白鶴駐山頭望之不得到舉手謝時人數日而去亦立祠於緱氏山下及嵩高首焉妙哉王子神遊氣爽笙歌伊洛擬音鳳響浮丘感應接手俱上揮策青崖假翰獨往
