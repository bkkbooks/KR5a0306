body:
  text: 文賓文賓者太丘鄉人也賣草履為業數取嫗數十年輒棄之後時故嫗壽老年九十餘續見賓年更壯他時嫗拜賓涕泣賓謝曰不宜至正月朝儻能會鄉亭西社中邪嫗老夜從兒孫行十餘里坐社中待之須臾賓到大驚汝好道邪知汝爾前不去汝也教令服菊花地膚桑上寄生松子取以益氣嫗亦更壯復百餘年見云文賓養生納氣玄虛松菊代御煉質鮮膚故妻好道拜泣踟躕引過告術延齡百餘
