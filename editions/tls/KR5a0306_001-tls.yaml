body:
  text: 寧封子寧封子者黃帝時人也世傳為黃帝陶正有人過之為其掌火能出五色煙久則以教封子封子積火自燒而隨煙氣上下視其灰燼猶有其骨時人共葬於寧北山中故謂之寧封子焉奇矣封子妙稟自然鑠質洪爐暢氣五煙遺骨灰燼寄墳寧山人睹其跡惡識其玄
