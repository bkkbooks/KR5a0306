body:
  text: 谷春谷春者櫟陽人也成帝時為郎病死而屍不冷家發喪行服猶不敢下釘三年更著冠幘坐縣門上邑中人大驚家人迎之不肯隨歸發棺有衣無屍留門上三宿去之長安止橫門上人知追迎之復去之太白山立祠於山上時來至其祠中止宿焉谷春既死停屍猶溫棺闔五稔端委於門顧視空柩形逝衣存留軌太白納氣玄根
