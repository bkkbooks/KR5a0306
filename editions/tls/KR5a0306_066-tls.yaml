body:
  text: 陵陽子明陵陽子明者鄉人也好釣魚於旋溪釣得白龍子明懼解鉤拜而放之後得白魚腹中有書教子明服食之法子明遂上黃山采五石脂沸水而服之三年龍來迎去止陵陽山上百餘年山去地千餘丈大呼下人令上山半告言中子安當來問子明釣車在否後二十餘年子安死人取葬石山下有黃鶴來棲其塚邊樹上鳴呼子安云陵陽垂釣白龍銜鉤終獲瑞魚靈述是修五石溉水騰山乘虯子安果沒鳴鶴何求
