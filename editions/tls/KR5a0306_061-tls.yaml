body:
  text: 呼子先呼子先者漢中關下卜師也老壽百餘歲臨去呼酒家老嫗曰急裝當與嫗共應中陵王夜有仙人持二茅狗來至呼子先子先持一與酒家嫗得而騎之乃龍也上華陰山常於山上大呼言子先酒家母在此云三靈潛感應若符契方駕茅狗蜿爾龍逝參登太華自稱應世事君不端會之有惠
