body:
  text: 東方朔東方朔者平原厭次人也久在吳中為書師數十年武帝時上書說便宜拜為郎至昭帝時時人或謂聖人或謂凡人作深淺顯默之行或忠言或詼語莫知其旨至宣帝初棄郎以避亂世置幘官舍風飄之而去後見於會稽賣藥五湖智者疑其歲星精也東方奇達混同時俗一龍一蛇豈豫榮辱高韻沖霄不羈不束沉跡五湖騰影暘谷
