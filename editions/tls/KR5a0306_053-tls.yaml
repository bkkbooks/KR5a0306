body:
  text: 毛女毛女者字玉姜在華陰山中獵師世世見之形體生毛自言秦始皇宮人也秦壞流亡入山避難遇道士谷春教食松葉遂不饑寒身輕如飛百七十餘年所居岩中有鼓琴聲云婉孌玉姜與時遁逸真人授方餐松秀實因敗獲成延命深吉得意岩岫寄歡琴瑟
