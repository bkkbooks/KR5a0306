body:
  text: 犢子犢子者鄴人也少在黑山採松子茯苓餌而服之且數百年時壯時老時好時醜時人乃知其仙人也常過酤酒陽都家陽都女者市中酤酒家女眉生而連耳細而長眾以為異皆言此天人也會犢子牽一黃犢來過都女悅之遂留相奉侍都女隨犢子出取桃李一宿而返皆連兜甘美邑中隨伺逐之出門共牽犢耳而走人不能追也且還復在市中數十年乃去見潘山下冬賣桃李云犢子山棲採松餌苓妙氣充內變白易形陽氏奇表數合理冥乃控靈犢倏若電征
