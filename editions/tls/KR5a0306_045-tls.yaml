body:
  text: 主柱主柱者不知何所人也與道士共上宕山言此有丹砂可得數萬斤宕山長吏知而上山封之砂流出飛如火乃聽柱取為邑令章君明餌砂三年得神砂飛雪服之五年能飛行遂與柱俱去云主柱同窺道士精徹玄感通山丹砂出穴熒熒流丹飄飄飛雪宕長悟之終然同悅
