body:
  text: 谿父谿父者南郡鄘人也居山間有仙人常止其家從買瓜教之煉瓜子與桂附子芷實共藏而對分食之二十餘年能飛走升山入水後百餘年居絕山頂呼谿下父老與道平生時事云谿父何欲欲在幽谷下臨清澗上翳委蓐仙客舍之導以秘篆形絕埃心在舊俗
