body:
  text: 涓子涓子者齊人也好餌朮接食其精至三百年乃見於齊著天人經四十八篇後釣於荷澤得鯉魚腹中有符隱於宕山能致風雨受伯陽九仙法淮南山安少得其文不能解其旨也其琴心三篇有條理焉涓老餌朮享茲遐紀九仙既傳三才乃理赤鯉投符風雨是使拊琴幽岩高棲遐峙
