body:
  text: 邗子邗子者自言蜀人也好放犬子時有犬走入山穴邗子隨入十餘宿行度數百里上出山頭上有台殿宮府青松樹森然仙吏侍衛甚嚴見故婦主洗魚與邗子符一函並藥便使還與成都令喬君喬君發函有魚子也著池中養之一年皆為龍形復送符還山上犬色更赤有長翰常隨邗子往來百餘年遂留止山上時下來護其宗族蜀人立祠於穴口常有鼓吹傳呼聲西南數千里共奉祠焉邗子尋犬宕入仙穴館閣峨峨青松列列受符傳藥往來交結遂棲靈岑音響昭徹
