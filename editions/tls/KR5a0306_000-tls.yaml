body:
  text: 赤松子赤松子者神農時雨師也服水玉以教神農能入火自燒往往至崑崙山上常止西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至高辛時復為雨師今之雨師本是焉眇眇赤松飄飄少女接手翻飛泠然雙舉縱身長風俄翼玄圃妙達巽坎作範司雨
