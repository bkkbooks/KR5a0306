body:
  text: 介子推介子推者姓王名光晉人也隱而無名悅趙成子與游旦有黃雀在門上晉公子重耳異之與出居外十餘年勞苦不辭及還介山伯子常晨來呼推曰可去矣推辭母入山中從伯子常游後文公遣數千人以玉帛禮之不出後三十年見東海邊為王俗賣扇後數十年莫知所在王光沉默享年遐久出翼霸君處契玄友推祿讓勤何求何取遯影介山浪跡海右
