body:
  text: 葛由葛由者羌人也周成王時好刻木羊賣之一旦騎羊而入西蜀蜀中王侯貴人追之上綏山綏山在峨嵋山西南高無極也隨之者不復還皆得仙道故里諺曰得綏山一桃雖不得仙亦足以豪山下立祠數十處云木可為羊羊亦可靈靈在葛由一致無經爰陟崇綏舒翼揚聲知術者仙得桃者榮
