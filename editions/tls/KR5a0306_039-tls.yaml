body:
  text: 崔文子崔文子者太山人也文子世好黃老事居潛山下後作黃散赤丸成石父祠賣藥都市自言三百歲後有疫氣民死者萬計長吏之文所請救文擁朱幡係黃散以徇人門飲散者即愈所活者萬計後去在蜀賣黃散故世寶崔文子赤丸黃散實近於神焉崔子得道術兼秘奧氣癘降喪仁心攸悼朱幡電麾神藥捷到一時獲全永世作效
