body:
  text: 祝雞翁祝雞翁者洛人也居屍鄉北山下養雞百餘年雞有千餘頭皆立名字暮棲樹上晝放散之欲引呼名即依呼而至賣雞及子得千餘萬輒置錢去之吳作養魚池後升吳山白鶴孔雀數百常止其傍云人禽雖殊道固相關祝翁傍通牧雞寄驩育鱗道洽棲雞樹端物之致化施而不刊
