body:
  text: 師門師門者嘯父弟子也亦能使火食桃李葩為夏孔甲龍師孔甲不能順其意殺而埋之外野一旦風雨迎之訖則山木皆焚孔甲祠而禱之還而道死師門使火赫炎其勢乃豢虯龍潛靈隱惠夏王虐之神存質斃風雨既降肅爾高逝
