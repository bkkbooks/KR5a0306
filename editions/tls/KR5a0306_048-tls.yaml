body:
  text: 昌容昌容者常山道人也自稱殷王子食蓬根往來上下見之者二百餘年而顏色如二十許人能致紫草賣與染家得錢以遺孤寡歷世而然奉祠者萬計殷女忘榮曾無遺戀怡我柔顏改華標蒨心與化遷日與氣煉坐臥奇貨惠及孤賤
