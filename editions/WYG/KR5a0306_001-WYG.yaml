body:
  text: 列仙𫝊卷上赤松子赤松子者神農時雨師也服水玉以教神農能入火自燒往往至崑崙山上常止西王母石室中隨風雨上下炎帝少女追之亦得仙俱去至髙辛時復為雨師今之雨師本是焉𦕈𦕈赤松飄飄少女接手翻飛泠然雙舉縱身長風俄翼𤣥圃妙逹巽坎作範司雨甯封子甯封子者黄帝時人也世𫝊為黄帝陶正有人過之為其掌火能出五色煙久則以教封子封子積火自燒而隨煙氣上下視其灰燼猶有其骨時人共葬於甯北山中故謂之甯封子焉竒矣封子妙禀自然鑠質洪鑪暢氣五煙遺骨灰燼寄墳甯山人覩其跡惡識其𤣥馬師皇馬師皇者黄帝時馬醫也知馬形生死之診治之輒愈後有龍下向之垂耳張口皇曰此龍有病知我能治乃鍼其唇下口中以甘草湯飲之而愈後數數有疾龍出其波告而求治之一旦龍負皇而去師皇典馬廏無殘駟精感羣龍術兼殊𩔖靈虬報徳彌鱗銜轡振躍天漢粲有遺蔚赤將子輿赤將子輿者黄帝時人不食五榖而噉百草花至堯帝時為木工能隨風雨上下時時於市中賣繳亦謂之繳父云蒸民粒食孰享遐祚子輿拔俗餐葩飲露託身風雨遥然矯歩雲中可遊性命可度黄帝黄帝者號曰軒轅能劾百神朝而使之弱而能言聖而預知知物之紀自以為雲師有龍形自擇亡日與群臣辭至於卒還葬橋山山崩柩空無尸唯劒舄在焉仙書云黄帝採首山之銅鑄鼎於荆山之下鼎成有龍垂胡髯下迎帝乃昇天群臣百僚悉持龍髯從帝而升攀帝弓及龍髯拔而弓墜群臣不得從仰望帝而悲號故後世以其處為鼎湖名其弓為烏號焉神聖淵𤣥邈哉帝皇暫蒞萬物冠名百王化周六合數通無方假葬橋山超升昊蒼偓佺偓佺者槐山採藥父也好食松實形體生毛長數寸兩目更方能飛行逐走馬以松子遺堯堯不暇服也松者簡松也時人受服者皆至二三百歳焉偓佺餌松體逸眸方足躡鸞鳯走超騰驤遺贈堯門貽此神方盡性可辭中智宜將容成公容成公者自稱黄帝師見於周穆王能善𥙷𨗳之事取精於𤣥牝其要谷神不死守生飬氣者也髮白更黑齒落更生事與老子同亦云老子師也亹亹容成専氣致柔得一在昔含光獨游道貫黄庭伯陽仰儔𤣥牝之門庶幾可求方回方回者堯時隐人也堯聘以為閭士煉食雲母亦與民人有病者𨼆於五柞山中夏啟末為宦士為人所刼閉之室中從求道回化而得去更以方回掩封其户時人言得回一丸泥塗門户終不可開方回頥生𨼆身五柞咀嚼雲英棲心隙漠却閉幽室重闗自廓印改掩封終焉不落老子老子姓李名耳字伯陽陳人也生於殷時為周柱下史好飬精氣貴接而不施轉為守藏史積八十餘年史記云二百餘年時稱為𨼆君子謚曰耼仲尼至周見老子知其聖人乃師之後周徳衰乃乗青牛車去入大秦過西闗闗令尹喜待而迎之知真人也乃强使著書作道徳經上下二卷老子無為而無不為道一生死跡入靈竒塞兊内鏡冥神絶涯徳合元氣夀同兩儀闗令尹闗令尹喜者周大夫也善内學常服精華𨼆徳修行時人莫知老子西遊喜先見其氣知有真人當過物色而遮之果得見老子老子亦知其竒為著書授之後與老子俱遊流沙化胡服苣勝實莫知其所終尹喜亦自著書九篇號曰闗令子尹喜抱闗含徳為務挹潄日華仰玩𤣥度候氣真人介焉獨悟俱濟流沙同歸妙處㳙子㳙子者齊人也好餌术接食其精至三百年乃見於齊著天人經四十八篇後釣於荷澤得鯉魚腹中有符𨼆於宕山能致風雨受伯陽九仙法淮南王安少得其文不能解其㫖也其琴心三篇有條理焉涓老餌术享兹遐紀九仙既𫝊三才乃理赤鯉投符風雲是使拊琴幽巖髙棲遐峙吕尚吕尚者冀州人也生而内智預見存亡避紂之亂𨼆於遼東四十年西適周匿於南山釣於磻溪三年不獲魚比閭皆曰可已矣尚曰非爾所及也已而果得兵鈐於魚腹中文王夢得聖人聞尚遂載而歸至武王伐紂常作隂謀百餘篇服澤芝地髓具二百年而告亡有難而不葬後子伋葬之無尸唯有玉鈐六篇在棺中云吕尚𨼆釣瑞得赬鱗通夢西伯同乗入臣沈謀籍世芝體鍊身逺代所稱美哉天人嘯父嘯父者冀州人也少在西周市上𥙷履數十年人不知也後竒其不老好事者造求其術不能得也唯梁毋得其作火法臨上三亮上與梁毋别列數十火而昇西邑多奉祀之嘯父駐形年衰不邁梁毋遇之歴虚啟會丹火翼耀紫煙成蓋𦕈企昇雲抑絶華㤗師門師門者嘯父弟子也亦能使火食桃李葩為夏孔甲龍師孔甲不能順其意殺而埋之外野一旦風雨迎之訖則山木皆焚孔甲祠而禱之還而道死師門使火赫炎其勢乃豢虬龍潛靈𨼆惠夏王虐之神存質斃風雨既降肅爾髙逝務光務光者夏時人也耳長七寸好琴服蒲韭根殷湯將伐桀因光而謀光曰非吾事也湯曰孰可曰吾不知也湯曰伊尹何如曰強力忍詬吾不知其他湯既克桀以天下讓於光曰智者謀之武者遂之仁者居之古之道也吾子胡不遂之請相吾子光辭曰廢上非義也殺人非仁也人犯其難我享其利非廉也吾聞非義不受其禄無道之世不踐其位况於尊我我不忍久見也遂負石自沈於蓼水已而自匿後四百餘歳至武丁時復見武丁欲以為相不從武丁以輿迎而從逼不以禮遂投浮梁山後遊尚父山務光自仁服食飬真㝠遊方外獨步常均武丁雖髙讓位不臣負石自沈虚無其身仇生仇生者不知何所人也當殷湯時為木正三十餘年而更壯皆知其竒人也咸共師奉之常食松脂在尸鄉北山上自作石室至周武王幸其室而祀之異哉仇生靡究其向治身事君老而更壯灼灼容顔怡怡徳量武王祠之北山之上彭祖彭祖者殷大夫也姓籛名鏗帝顓頊之孫陸終氏之中子歴夏至殷末八百餘歳常食桂芝善導引行氣歴陽有彭祖仙室前世禱請風雨莫不輒應常有兩虎在祠左右祠訖地即有虎跡云後昇仙而去遐哉碩仙時維彭祖道與化新綿綿歴古𨼆倫𤣥室靈著風雨二虎嘯時莫我猜侮卭疏卭疏者周封史也能行氣鍊形煮石髓而服之謂之石鍾乳至數百年往來入太室山中有卧石牀枕焉八珍促夀五石延生卭疏得之鍊髓餌精人以百年行邁身輕寢息中嶽遊步仙庭介子推介子推者姓王名光晉人也𨼆而無名悦趙成子與遊旦有黄雀在門上晉公子重耳異之與出居外十餘年勞苦不辭及還介山伯子常晨來呼推曰可去矣推辭母入山中從伯子常遊後文公遣數十人以玉帛禮之不出後三十年見東海邊為王俗賣扇後數十年莫知所在王光沈黙享年遐久出翼霸君處契𤣥友推禄讓勤何求何取遯影介山浪跡海右馬丹馬丹者晉耿之人也當文侯時為大夫至獻公時復為幕府正獻公滅耿殺恭太子丹乃去至趙宣子時乗安車入晉都候諸大夫靈公欲仕之逼不以禮有迅風發屋丹入迴風而去北方人尊而祠之馬丹官晉與時汙隆事文去獻顯没不窮宻網將設從禮迅風杳然獨上絶跡𤣥宫平常生榖城鄉平常生者不知何所人也數死復生時人以為不然後大水出所害非一而平輒在缺門山頭大呼言平常生在此云復水雨五日必止止則上山求祠之但見平衣帔革帶後數十年復為華隂門卒榖城妙匹譎逹竒逸出生入死不恒其質𤣥化忘形貴賤奚恤暫降塵汙終騰雲室陸通陸通者云楚狂接輿也好飬生食橐盧木實及蕪菁子遊諸名山在蜀峨嵋山上世世見之歴數百年去接輿樂道飬性潛輝見諷尼父諭以鳯衰納氣以和存心以㣲髙步靈嶽長嘯峨嵋葛由葛由者羌人也周成王時好刻木羊賣之一日騎羊而入西蜀蜀中王侯貴人追之上綏山綏山在峨嵋山西南髙無極也隨之者不復還皆得仙道故里諺曰得綏山一桃雖不得仙亦足以豪山下祠數十處云木可為羊羊亦可靈靈在葛由一致無經爰陟崇綏舒翼揚聲知術者仙得桃者榮江妃二女江妃二女者不知何所人也出遊於江漢之湄逢鄭交甫見而悦之不知其神人也謂其僕曰我欲下請其佩僕曰此間之人皆習於辭不得恐罹悔焉交甫不聴遂下與之言曰二女勞矣二女曰客子有勞妾何勞之有交甫曰橘是柚也我盛之以笥令附漢水將流而下我遵其傍採其芝而茹之以知吾為不遜也願請子之佩二女曰橘是柚也我盛之以筥令附漢水將流而下我遵其旁採其芝而茹之遂手解佩與交甫交甫悦受而懐之中當心趨去數十步視佩空懐無佩顧二女忽然不見靈妃艶逸時見江湄麗服㣲步流盻生姿交甫遇之憑情言私鳴珮虚擲絶影焉追范蠡范蠡字少伯徐人也事周師太公望好服桂飲水為越大夫佐勾踐破吳後乗輕舟入海變名姓適齊為䲭夷子更後百餘年見於陶為陶朱君財累億萬號陶朱公後棄之蘭陵賣藥後人世世識見之范蠡御桂心虚志逺受業師望載潛載惋龍見越鄉功遂身返屣脱千金與道舒卷琴髙琴髙者趙人也以鼔琴為宋康王舍人行涓彭之術浮遊冀州涿一作碭郡之間二百餘年後辭入涿水中取龍子與諸弟子期曰皆潔齋待於水傍設祠果乗赤鯉來出坐祠中旦有萬人觀之留一月餘復入水去琴髙晏晏司樂宋宫離世孤逸浮沈涿中出躍頳鱗入藻清沖是任水解其樂無窮冦先冦先者宋人也以釣魚為業居睢水旁百餘年得魚或放或賣或自食之常著冠帶好種茘枝食其葩實焉宋景公問其道不告即殺之數十年踞宋城門鼔琴數十日乃去宋人家家奉祀焉冦先惜道術不虚𫝊景公戮之尸解神遷歴載五十撫琴來旋夷俟宋門暢意五絃王子喬王子喬者周靈王太子晉也好吹笙作鳯凰鳴遊伊洛之間道士浮丘公接以上嵩髙山三十餘年後求之於山上見栢良曰告我家七月七日待我於緱氏山巔至時果乗白鶴駐山頭望之不得到舉手謝時人數日而去亦立祠於緱氏山下及嵩髙首焉妙哉王子神遊氣爽笙歌伊洛擬音鳯響浮邱感應接手俱上揮䇿青崖假翰獨往㓜伯子㓜伯子者周蘇氏客也冬常著單衣盛暑著襦袴形貌歳異後數十年更壯時人莫知世世來誡祐蘇氏子孫得其福力也周客戢容泯跡泥盤夏服重纊冬振輕紈作不背本義不獨安乃眷周氏祐其艱難安期先生安期先生者瑯琊阜鄉人也賣藥於東海邊時人皆言千歳翁秦始皇東遊請見與語三日三夜賜金璧度數千萬出於阜鄉亭皆置去留書以赤玉舄一雙為報曰後數年求我於蓬萊山始皇即遣使者徐市盧生等數百人入海未至蓬萊山輒逢風波而還立祠阜鄉亭海邊十數處云寥寥安期虚質髙清乗光適性保氣延生聊悟秦始遺寶阜亭將遊蓬萊絶影清泠桂父桂父者象林人也色黒而時白時黄時赤南海人見而尊事之常服桂及葵以龜腦和之千九十斤桂累世見之今荆州之南尚有桂丸焉偉哉桂父挺直遐畿靈葵内潤丹桂外綏怡怡柔顔代代同輝道播東南奕世莫違瑕邱仲瑕邱仲者寗人也賣藥於甯百餘年人以為夀矣地動舍壊仲及里中數十家屋臨水皆敗仲死民人取仲尸棄水中收其藥賣之仲披裘而從詣之取藥棄仲者懼叩頭求哀仲曰恨汝使人知我耳吾去矣後為夫餘胡生驛使復來至甯北方謂之謫仙人焉瑕邱通𤣥謫脱其跡人死亦死泛焉言惜遨步觀化豈勞胡驛茍不覩本誰知其謫酒客酒客者梁市上酒家人也作酒常美而售日得萬錢有過而逐之主人酒常酢敗窮貧梁市中賈人多以女妻而迎之或去或來後百餘歳來為梁丞使民益種芋菜曰三年當大飢卒如其言梁民不死五年解印綬去莫知其終焉酒客蕭倅寄沽梁肆何以標異醇醴殊味屈身佐時民用不匱解紱晨征莫知所萃任光任光者上蔡人也善餌丹賣於都市里間積八十九年乃知是故時任光也皆説如數十歳面顔後長老識之趙簡子聘與俱歸常在栢梯山上三世不知所在晉人常服其丹也上蔡任光能鍊神丹年涉期頤瞱爾朱顔頃適趙子縱任所安升軌栢梯髙飛雲端蕭史蕭史者秦穆公時人也善吹簫能致孔雀白鶴於庭穆公有女字弄玉好之公遂以女妻焉日教弄玉作鳳鳴居數年吹似鳯聲鳯凰來止其屋公為作鳯臺夫婦止其上不下數年一旦皆隨鳯凰飛去故秦人為作鳯女祠於雍宫中時有簫聲而已蕭史妙吹鳯雀舞庭嬴氏好合乃習鳯聲遂攀鳯翼參翥髙㝠女祠寄想遺音載清祝雞翁祝雞翁者洛人也居尸鄉北山下飬雞百餘年雞有千餘頭皆立名字暮棲樹上晝放散之欲引呼名即依呼而至賣雞及子得千餘萬輒置錢去之吳作飬魚池後升吳山白鶴孔雀數百常止其傍云人禽雖殊道固相闗祝翁傍通牧雞寄驩育鱗道洽棲雞樹端物之致化施而不刋朱仲朱仲者會稽人也常於會稽市上販珠漢髙后時下書募三寸珠仲讀購書笑曰直值汝矣齎三寸珠詣闕上書珠好過度即賜五百金魯元公主復私以七百金從仲求珠仲獻四寸珠送置於闗即去下書會稽徵聘不知所在景帝時復來獻三寸珠數十枚輒去不知所之云朱仲無欲聊寄賈商俯窺驪龍捫此夜光發跡會稽曜竒咸陽施而不徳歴世彌彰脩羊公脩羊公者魏人也在華隂山上石室中有懸石榻卧其上石盡穿陷畧不食時取黄精食之後以道干景帝帝禮之使止王邸中數歳道不可得有詔問脩羊公能何日發語未訖牀上化為白羊題其脇曰脩羊公謝天子後置石羊於靈臺上羊後復去不知所在卓矣脩羊韜竒含靈枕石太華餐茹黄精漢禮雖隆道非所經應變多質忽爾𨼆形稷邱君稷邱君者太山下道士也武帝時以道術受賞賜髪白再黑齒落更生後罷去上東廵太山稷邱君乃冠章甫衣黄衣擁琴來迎拜武帝指帝陛下勿上也上必傷足指及數里右足指果折上諱之故但祠而還為稷邱君立祠焉為稷承奉之云稷邱洞徹修道靈山鍊形濯質變白還年漢武行幸㩦琴來延戒以升陟逆覩未然崔文子崔文子者太山人也文子世好黄老事居潛山下後作黄散赤丸成石父祠賣藥都市自言三百歳後有疫氣民死者萬計長吏之文所請救文擁朱旛繫黄散以徇人門飲散者即愈所活者萬計後去在蜀賣黄散故世寶崔文赤丸黄散實近於神焉崔子得道術兼祕奥氣癘降喪仁心攸悼朱旛雷麾神藥㨗到一時獲全永世作效列仙𫝊卷上
