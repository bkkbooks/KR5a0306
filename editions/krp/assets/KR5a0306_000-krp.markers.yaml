  body:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書子部十四列仙𫝊道家𩔖提要臣等謹按列仙𫝊二卷舊本題漢劉向撰紀古来仙人自赤松子至𤣥俗凡七十一人人係以讃篇末又為總讃一首其體全仿列女𫝊陳振孫書録解題以為不𩔖西漢文字必非向撰黄伯思東觀餘論謂是書雖非向筆而事詳語約詞㫖明潤疑東京人作今考是書隋志著録則出于梁前又葛洪神仙𫝊序亦稱此書為向作則晉時巳有其本然漢志列劉向序六十七篇但有新序説苑世說列女𫝊圖頌無列仙𫝊之名又漢志所録皆因七畧其總讃引孝經援神契為漢志所不載涓子𫝊稱其琴心三篇有條理與漢志涓子十三篇不合老子𫝊稱作道徳經上下二篇與漢志但稱老子亦不合均不應自相違異或魏晉間方士為之託名于向振孫又云館閣書目作三卷六十一人中興書目作二卷七十二人李石續博物志亦云劉向𫝊列仙七十二人皆與此本小異惟葛洪神𫝊傳序稱七十一人此本上卷四十人下卷三十人内江婓二女應作二人與洪所記適合檢李善文選註及唐初藝文𩔖聚諸書所引文亦相符當為舊本其篇末之讚今槩以為向作考隋志載列仙𫝊讚二卷劉向撰晉郭元祖讚又孫綽讚三卷此本二卷校孫綽所讚少一卷又劉義慶世説新語載孫綽作商丘子胥讚曰所牧何物殆非真豬儻遇風雲為我龍攄此本商丘子胥讚亦無此語然則此本之讚其郭元祖所撰歟以相𫝊舊刻未列郭名疑以𫝊疑今亦姑闕焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀}
