front:
  text: 列仙傳卷下海七
  hash: sha256:a65170898298a72e4c5faab043d02b40cd9806fa3aa64a0f5056f0e26a9b2aa0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0306_SJB_002-050071a, image: sjb/05/050071a.png}
body:
  text: 漢光禄大夫劉向撰赤須子赤須子豐人也豐中傳世見之云秦穆公時主魚吏也數道豐界災害水旱十不失一臣下歸向迎而師之從受業問所長好食松實天門冬石脂齒落更生髪墮再出服霞絶後遂去吴山下十餘年莫知所之赤須去豐爰憩吴山三藥並御朽貌再鮮空往師之而無使延顧問小智豈識巨年東方朔東方朔者平原厭次人也乆在吴中爲書師數十年武帝時上書說便宜拜爲郎至昭帝時時人或謂聖人或謂凡人作深淺顯默之行或忠言或虧語莫知其㫖至宣帝初棄郎以避亂世置幘官舍風飄之而去後見於會稽賣藥五湖智者疑其歲星精也東方奇達混同時俗一龍一蛇豈豫榮辱高韻冲霄不羈不束沈跡五湖騰影暘谷鈎翼夫人鈎翼夫人者齊人也姓趙少時好清凈病卧六年右手拳屈飲食少望氣者云東北有貴人氣推而得之召到姿色甚偉武帝披其手得一玉鈎而手尋展遂幸而生昭帝後武帝害之殯尸不冷而香一月間後昭帝即位更葬之棺内但有絲履故名其宫曰鈎翼後避諱改爲弋廟闈有神祠閣在焉婉婉弱媛廟符授鉤誕育嘉嗣皇祚惟休武之不達背德致仇委身受戮尸滅芳流犢子犢子者鄴人也少在黑山採松子茯苓餌而服之且數百年時壯時老時好時醜時人乃知其仙人也常過酤酒陽都家陽都女者市中酤酒家女眉生而連耳細而長衆以爲異皆言此天人也會犢子牽一黄犢來過都女悦之遂留相奉侍都女隨犢子出取桃李一宿而返皆連兜甘美邑中隨伺逐之出門共牽犢耳而走人不能追也且還復在市中數十年乃去見潘山下冬賣桃李云犢子山棲採松餌苓妙氣充内變白易形陽氏竒表數合理冥乃控靈犢倏若電征騎龍鳴騎龍鳴者渾亭人也年二十於池中求得龍子狀如守宫者十餘頭養食結草廬而守之龍長大稍稍而去後五十餘年水壞其廬而去一旦騎龍來渾亭下語云馮伯昌孫也此間人不去五百里必當死信者皆去不信者以爲妖至八月果水至死者萬計騎鳴養龍結廬虚池專至俟化乗雲驂螭紆轡故鄉吿以速移洞鏡災祥情眷不離主柱主柱者不知何所人也與道士共上宕山言此有丹砂可得數萬斤宕山長吏知而上山封之砂流岀飛如火乃聽柱取爲邑令章君明餌砂三年得神砂飛雪服之五年能飛行遂與柱俱去云主柱同窺道士精徹玄感通山丹砂出穴熒熒流丹飄飄飛雪宕長悟之終然同悦園客園客者濟陰人也姿貌好而性良邑人多以女妻之客終不取常種五色香草積數十年食其實一旦有五色蛾止其香樹末客收而薦之以布生桑蠶焉至蠶時有好女夜至自稱客妻道蠶狀客與俱收蠶得百二十頭繭皆如甕大繅一繭六十日始盡訖則俱去莫知所在故濟陽人世祠桑蠶設祠室焉或云陳留濟陽氏美哉園客顔曄朝華仰吸玄精俯捋五葩馥馥芳卉采采文蛾淑女宵降配德升遐鹿皮公鹿皮公者淄川人也少爲府小吏木工舉手能成器械岑山上有神泉人不能至也小吏白府君請木工斤斧三十人作轉輪懸閣意思横生數十日梯道四間成上其巔作祠舍留止其旁絶其二間以自固食芝草飲神泉且七十年淄水來三下呼宗族家室得六十餘人令上山半水盡漂一郡没者萬計小吏乃辭遣宗家令下山着鹿皮衣遂去復上閣後百餘年下賣藥於市皮公興思妙巧纏綿飛閣懸趣上挹神泉肅肅清廟愔愔二間可以閑處可以永年昌容昌容者常山道人也自稱殷王子食蓬虆根往來上下見之者二百餘年而顔色如二十許人能致紫草賣與染家得錢以遺孤寡歷世而然奉祠者萬計殷女忘榮曾無遺戀怡我柔顔改華標蒨心與化遷日與氣鍊坐卧奇貨惠及孤賤谿父谿父者南郡鄘人也居山間有仙人常止其家從買瓜教之鍊瓜子與桂附子芷實共藏而對分食之二十餘年能飛走昇山入水後百餘年居絶山頂呼谿下父老與道平生時事云谿父何欲欲在幽谷下臨清澗上翳委蓐仙客舍之導以秘籙形絶埃𡏖心在舊俗山圖山圖者隴西人也少好乗馬馬蹋之折脚山中道人教令服地黄當歸羌活獨活苦參散服之一歲而不嗜食病愈身輕追道人問之自言五嶽使之名山採藥能隨吾使汝不死山圖追隨之六十餘年一旦歸來行母服於家間朞年復去莫知所之山圖抱患因毁致全受氣使身藥輕命延寫哀墳栢天愛猶纏數周高舉永絶俗縁谷春谷春者櫟陽人也成帝時爲郎病死而屍不冷家發喪行服猶不敢下釘三年更著冠幘坐縣門上邑中人大驚家人迎之不肯隨歸發棺有衣無屍留門上三宿去之長安止橫門上人知追迎之復去之太白山立祠於山上時來至其祠中止宿焉谷春旣死停屍猶温棺闔五稔端委於門顧視空柩形逝衣存留軌太白納氣玄根陰生陰生者長安中渭橋下乞兒也常止於市中乞市人厭苦以糞灑之旋復在里中衣不見污如故長吏知之械收繫著桎梏而續在市中乞又械欲殺之乃去灑者之家室自壞殺十餘人故長安中謡曰見乞兒與美酒以免破屋之咎陰生乞兒人厭其黷識眞者稀累見囚辱淮陰忘吝况我仙屬惡肆殃及自災其屋毛女毛女者字玉姜在華陰山中獵師世世見之形體生毛自言秦始皇宫人也秦壞流亡入山避難遇道士谷春教食松葉遂不饑寒身輕如飛百七十餘年所止巖中有鼓琴聲云婉變玉姜與時遁逸眞人授方餐松秀實因敗獲成延命深吉得意巖岫寄歡琴瑟子英子英者舒鄉人也善入水捕魚得赤鯉愛其色好持歸著池中數以米穀食之一年長丈餘遂生角有翅翼子英怪異拜謝之魚言我來迎汝汝上背與汝俱昇天即大雨子英上其魚背騰昇而去歲歲來歸故舍食飲見妻子魚復來迎之如此七十年故吴中門户皆作神魚遂立子英祠子英樂水游捕爲職靈鱗來赴有煒厥色養之長之挺角傳翼遂駕雲螭超步太極服閭服閭者不知何所人也常止莒往來海邊諸祠中有三仙人於祠中博賭瓜顧閭令擔黃白瓜數十頭教令暝目及覺乃在方丈山在蓬萊山南後往來莒取方丈山上珍寳珠玉賣之乆矣一旦髠頭着赭衣貌更老人問之言坐取廟中物云後數年貌更壯好鬢髪如往日時矣服閭游祠三仙是使假寐須臾忽超千里納寳毁形未足多恥攀龍附鳳逍遥終始文賔文賔者太丘鄉人也賣草履爲業數取嫗數十年輒棄之後時故嫗壽老年九十餘續見賔年更壯他時嫗拜賔涕泣賔謝曰不宜至正月朝儻能會鄉亭西社中邪嫗老夜從兒孫行十餘里坐社中待之須臾賔到大驚汝好道邪知汝爾前不去汝也教令服菊花地膚桑上寄生松子取以益氣嫗亦更壯復百餘年見云文賔養生納氣玄虛松菊代御鍊質鮮膚故妻好道拜泣踟蹰引過告術延齡百餘商丘子胥商丘子胥者高邑人也好牧豕吹竽年七十不娶婦而不老邑人多竒之從受道問其要言但食术菖蒲根飲水不饑不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終歳輒止墯慢矣謂將復有匿術也商丘幽棲韞櫝妙術渴飲寒泉饑茹蒲术吹竽牧豕卓犖奇出道足無求樂兹水日子主子主者楚語而細音不知何所人也詣江都王自言寧先生顧我作客三百年不得作直以爲狂人也問先生所在云在龍眉山上王遣吏將上龍眉山巔見寧先生毛身廣耳被髪鼓琴主見之叩頭吏致王命先生曰此主吾比舍九世孫且念汝家當有暴死女子三人勿預吾事語竟大風發吏走下山比歸宫中相殺三人王遣三牲立祠焉子主挺年理有所資寧主祠秀拊琴龍眉以道相符當與訟微匡事竭力問昭我師陶安公陶安公者六安鑄冶師也數行火火一旦散上行紫色衝天安公伏冶下求哀須臾朱雀止冶上曰安公安公冶與天通七月七日迎汝以赤龍至期赤龍到大雨而安公騎之東南上一城邑數萬人衆共送視之皆與辭决云安公縱火紫炎洞熙翩翩朱雀銜信告時奕奕朱虬蜿然赴期傾城仰覿迴首顧辭赤斧赤斧者巴戎人也爲碧雞祠主簿能作水澒鍊丹與硝石服之三十年反如童子毛髪生皆赤後數十年上華山取禹餘糧餌賣之於蒼梧湘江間累世傳見之手掌中有赤斧焉赤斧頤眞發秀戎巴寓跡神祠澒鍊丹砂髮雖朱蕤顔曄丹葩采藥靈山觀化南遐呼子先呼子先者漢中關下卜師也老壽百餘歲臨去呼酒家老嫗曰急裝當與嫗共應中陵王夜有仙人持二茅狗來至呼子先子先持一與酒家嫗得而騎之乃龍也上華陰山常於山上大呼言子先酒家母在此云三靈潜感應若符契方駕茅狗蜿爾龍逝參登大華自稱應世事君不端會之有惠負局先生負局先生者不知何許人也語似燕代間人常負磨鏡局徇吴市中衒磨鏡一錢因磨之輒問主人得無有疾苦者輒出紫丸藥以與之得者莫不愈如此數十年後大疫病家至户到與藥活者萬計不取一錢吴人乃知其眞人也後主吴山絶崖頭懸藥下與人將欲去時語下人曰吾還蓬萊山爲汝曹下神水崖頭一旦有水白色流從石間來下服之多愈疾立祠十餘處負局神端披褐含秀術兼和鵲心託宇宙引彼萊泉灌此絶岫欲返蓬山以齊天壽朱璜朱璜者廣陵人也少病毒瘕就睢山上道士阮丘丘憐之言卿除腹中三屍有眞人之業可度教也璜曰病愈當爲君作客三十年不敢自還丘與璜七物藥日服九丸百日病下如肝脾者數斗養之數十日肥健心意日更開朗與老君黄庭經令日讀三過通之能思其意丘遂與璜俱入浮陽山玉女祠且八十年復見故處白髪盡黑鬢更長三尺餘過食止數年復去如此至武帝末故在焉朱璜寢瘕福祚相迎眞人投藥三屍俱靈心虛神瑩騰賛幽㝠毛赬髮黑超然長生黃阮丘黄阮丘者睢山上道士也衣裘被髪耳長七寸口中無齒日行四百里於山上種葱薤百餘年人不知也時下賣藥朱璜發明之乃知其神人也地動山崩道絶預戒下人世共奉祠之葱藹巖嶺實棲若人被裘散髮輕步絶倫含道養生妙觀通神發驗朱璜告徧下民女丸女丸者陳市上沽酒婦人也作酒常美遇仙人過其家飲酒以素書五卷爲質丸開視其書乃養性交接之術丸私寫其文要更設房室納諸年少飲美酒與止宿行文書之法如此三十年顔色更如二十時仙人數歲復來過笑謂丸曰盜道無師有翅不飛遂棄家追仙人去莫知所之云玄素有要近取諸身彭聃得之五卷以陳女丸藴妙仙客來臻傾書開引雙飛絶塵陵陽子明陵陽子明者銍鄉人也好釣魚於旋溪釣得白龍子明懼解鈎拜而放之後得白魚腹中有書教子明服食之法子明遂上黄山採五石脂沸水而服之三年龍來迎去止陵陽山上百餘年山去地千餘丈大呼下人令上山半吿言谿中子安當來問子明釣車在否後二十餘年子安死人取葬石山下有黄鶴來棲其塚旁樹上鳴呼子安云陵陽垂釣白龍銜鈎終獲瑞魚靈述是修五石溉水騰山乗虬子安果没鳴鶴何求邗子邗子者自言蜀人也好放犬子時有大走入山穴邗子隨入十餘宿行度數百里上出山頭上有臺殿宫府青松樹森然仙吏侍衛甚嚴見故婦主洗魚與邗子符一函并藥便使還與成都令喬君喬君發函有魚子也著池中養之一年皆爲龍形復送符還山上犬色更赤有長翰常隨邗子往來百餘年遂留止山上時下來護其宗族蜀人立祠於穴口常有鼓吹傳呼聲西南數千里共奉祠焉邗子尋犬宕入仙穴館閣峨峨青松列列受符傳藥往來交結遂棲靈岑音響昭徹木羽木羽者鉅鹿南和平鄉人也母貧賤主助産嘗探産婦兒生便開目視母大笑其母大怖夜夢見大冠赤幘者守兒言此司命君也當報汝恩使汝子木羽得仙母陰信識之母後生兒字之爲木羽所探兒生年十五夜有車馬來迎去遂過母家呼木羽木羽爲御來遂俱去後二十餘年鸛雀旦銜二尺魚著母户上母匿不道而賣其魚三十年乃没去母至百年乃終司命挺靈産母震驚乃要報了契定未成道足三五輕駟宵迎終然報德乆乃遐齡玄俗玄俗者自言河間人也餌巴豆賣藥都市七丸一錢治百病河間王病瘕買藥服之下蛇十餘頭問藥意俗云王瘕乃六世餘殃下墮即非王所招也王常放乳鹿怜母也仁心感天故當遭俗耳王家老舍人自言父世見俗俗形無影王乃呼俗日中看實無影王欲以女配之俗夜亡去後人見於常山下質虛影滅時惟玄俗布德神丸乃寄鹿贖道發河間親寵方渥騰龍不制超然絶足讚曰易稱太極是生兩儀兩儀生然後有人民有人民然後有生死生死之義著明矣蓋萬物施張渾爾而就亦無所不備焉神矣妙矣精矣微矣其事不可得一一論也聖人仰則觀象於天俯則觀法於地日月運行四時分治五星受制於太微監無道之國吉凶預見以戒土者動靜言語應效相通有自來矣天然雖不言其變化云爲不可謂之無也周書序桑蟜問涓子曰有死亡而復云有神仙者事兩成邪涓子曰言固可兩有耳孝經援神契言不過天地造靈洞虛猶立五嶽設三台陽精主外陰精主内精氣上下經緯人物道治非一若夫草木皆春生秋落必矣而木有松栢橿檀之倫百八十餘種草有芝英萍實靈沼黄精白符竹戒火長生不死者萬数盛冬之時經霜歷雪蔚而不彫見斯其類也何怪於有仙邪余嘗得秦大夫阮倉撰仙圖自六代迄今有七百餘人始皇好遊仙之事庶幾有獲故方士霧集祈祀彌布殆必因迹託虛寄空爲實不可信用也若周公黄録記太白下爲王公然歲星變爲寧壽公等所見非一家聖人所以不開其事者以其無常然雖有時著蓋道不可棄距而閉之尚貞正也而論語云怪力亂神其微㫖可知矣列仙傳卷下
