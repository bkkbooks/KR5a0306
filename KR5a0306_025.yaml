body:
  text: 琴高琴高者趙人也以鼓琴為宋康王舍人行涓彭之術浮遊冀州涿一作碭郡之間二百餘年後辭入涿水中取龍子與諸弟子期曰皆潔齋待於水傍設祠果乘赤鯉來出坐祠中日有萬人觀之留一月餘復入水去琴高晏晏司樂宋宮離世孤逸浮沉涿中出躍赬鱗入藻清衝是任水解其樂無窮
