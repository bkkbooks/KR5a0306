  text: 赤斧赤斧者巴戎人也為碧雞祠主簿能作水煉丹與硝石服之三十年反如童子毛髮生皆赤後數十年上華山取禹餘糧餌賣之於蒼梧湘江間纍世傳見之手掌中有赤斧焉赤斧頤真發秀戎巴寓跡神祠澒煉丹砂發雖朱蕤顏曄丹葩採藥靈山觀化南遐
