body:
  text: 陰生陰生者長安中渭橋下乞兒也常止於市中乞市人厭苦以糞灑之旋復在裡中衣不見污如故長吏知之械收係著桎梏而續在市中乞又械欲殺之乃去灑者之家室自壞殺十餘人故長安中謠曰見乞兒與美酒以免破屋之咎陰生乞兒人厭其黷識真者稀累見囚辱淮陰忘吝況我仙屬惡肆殃及自災其屋
