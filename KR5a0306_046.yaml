body:
  text: 園客園客者濟陰人也姿貌好而性良邑人多以女妻之客終不取常種五色香草積數十年食其實一旦有五色蛾止其香樹末客收而薦之以布生桑蠶焉至蠶時有好女夜至自稱客妻道蠶狀客與俱收蠶得百二十頭繭皆如甕大繅一繭六十日始盡訖則俱去莫知所在故濟陰人世祠桑蠶設祠室焉或云陳留濟陽氏美哉園客顏曄朝華仰吸玄精俯捋五葩馥馥芳卉采采文蛾淑女宵降配德升遐
