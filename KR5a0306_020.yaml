body:
  text: 平常生谷城鄉平常生者不知何所人也數死復生時人以為不然後大水出所害非一而平輒在缺門山頭大呼言平常生在此雲復水雨五日必止止則上山求祠之但見平衣帔革帶後數十年復為華陰門卒谷城妙匹譎達奇逸出生入死不恆其質玄化忘形貴賤奚恤暫降塵汙終騰雲室
