body:
  text: 黃阮丘黃阮丘者睢山上道士也衣裘披髮耳長七寸口中無齒日行四百里於山上種蔥薤百餘年人不知也時下賣藥朱璜發明之乃知其神人也地動山崩道絶預戒下人世共奉祠之蔥藹岩嶺實棲若人被裘散髮輕步絶倫含道養生妙觀通神發驗朱璜告遍下民
