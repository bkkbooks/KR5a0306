body:
  text: 關令尹關令尹喜者周大夫也善內學常服精華隱德修行時人莫知老子西遊喜先見其氣知有真人當過物色而遮之果得老子老子亦知其奇為著書授之後與老子俱遊流沙化胡服苣勝實莫知其所終尹喜亦自著書九篇號曰關令子尹喜抱關含德為務挹漱日華仰玩玄度候氣真人介焉獨悟俱濟流沙同歸妙處
