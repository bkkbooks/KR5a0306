body:
  text: 稷丘君稷丘君者泰山下道士也武帝時以道術受賞賜髮白再黑齒落更生後罷去上東巡泰山稷丘君乃冠章甫衣黃衣擁琴來迎拜武帝指帝陛下勿上也上必傷足指及數里右足指果折上諱之故但祠而還為稷丘君立祠焉為稷承奉之云稷丘洞徹修道靈山煉形濯質變白還年漢武行幸攜琴來延戒以升陟逆睹未然
