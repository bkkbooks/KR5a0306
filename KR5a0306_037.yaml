body:
  text: 修羊公修羊公者魏人也在華陰山上石室中有懸石榻臥其上石盡穿陷略不食時取黃精食之後以道干景帝帝禮之使止王邸中數歲道不可得有詔問修羊公能何日發語未訖牀上化為白羊題其脅曰修羊公謝天子後置石羊於靈台上羊後復去不知所在卓矣修羊韜奇含靈枕石太華餐茹黃精漢禮雖隆道非所經應變多質忽爾隱形
