body:
  text: 木羽木羽者鉅鹿南和平鄉人也母貧賤主助產嘗探產婦兒生便開目視母大笑其母大怖夜夢見大冠赤幘者守兒言此司命君也當報汝恩使汝子木羽得仙母陰信識之母後生兒字之為木羽所探兒生年十五夜有車馬來迎去遂過母家呼木羽木羽為御來遂俱去後二十餘年鸛雀旦銜二尺魚著母戶上母匿不道而賣其魚三十年乃沒去母至百年乃終司命挺靈產母震驚乃要報了契定未成道足三五輕駟宵迎終然報德久乃遐齡
