body:
  text: 馬師皇馬師皇者黃帝時馬醫也知馬形生死之診治之輒愈後有龍下向之垂耳張口皇曰此龍有病知我能治乃其下口中以甘草湯飲之而愈後數數有龍出其波告而求治之一旦龍負皇而去師皇典馬廄無殘駟精感群龍術兼殊類靈虯報德彌鱗銜轡振躍天漢粲有遺蔚
