body:
  text: 陶安公陶安公者六安鑄冶師也數行火火一旦散上行紫色沖天安公伏冶下求哀須臾朱雀止冶上曰安公安公治與天通七月七日迎汝以赤龍至期赤龍到大雨而安公騎之東南上一城邑數萬人衆共送視之皆與辭決云安公縱火紫炎洞熙翩翩朱雀銜信告時奕奕朱虯蜿然赴期傾城仰覿回首顧辭
