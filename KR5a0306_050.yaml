body:
  text: 山圖山圖者隴西人也少好乘馬馬踏之折腳山中道人教令服地黃當歸羌活獨活苦參散服之一歲而不嗜食病癒身輕追道人問之自言五嶽使之名山採藥能隨吾使汝不死山圖追隨之六十餘年一旦歸來行母服于家間期年復去莫知所之山圖抱患因毀致金受氣使身藥輕命延寫哀墳柏天愛猶纏數周高舉永絕俗緣
