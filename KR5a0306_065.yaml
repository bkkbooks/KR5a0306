body:
  text: 女丸女丸者陳市上沽酒婦人也作酒常美遇仙人過其家飲酒以素書五卷為質丸開視其書乃養性交接之術丸私寫其文要更設房室納諸年少飲美酒與止宿行文書之法如此三十年顏色更如二十時仙人數歲復來過笑謂丸曰盜道無私有翅不飛遂棄家追仙人去莫知所之云玄素有要近取諸身鼓聃得之五卷以陳女丸蘊妙仙客來臻傾書開引雙飛絶塵
