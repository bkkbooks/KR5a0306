body:
  text: 子英子英者舒鄉人也善入水捕魚得赤鯉愛其色好持歸著池中數以米穀食之一年長丈餘遂生角有翅翼子英怪異拜謝之魚言我來迎汝汝上背與汝俱升天即大雨子英上其魚背騰升而去歲歲來歸故舍食飲見妻子魚復來迎之如此七十年故吳中門戶皆作神魚遂立子英祠子英樂水遊捕為職靈鱗來赴有煒厥色養之長之挺角傅翼遂駕雲螭超步虓央
