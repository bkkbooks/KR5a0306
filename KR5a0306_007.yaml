body:
  text: 方回方回者堯時隱人也堯聘以為閭士煉食雲母亦與民人有病者隱於五柞山中夏啟末為宦士為人所劫閉之室中從求道回化而得去更以方回掩封其戶時人言得回一丸泥塗門戶終不可開方回頤生隱身五柞咀嚼雲英棲心隙漠劫閉幽室重關自廓印改掩封終焉不落
