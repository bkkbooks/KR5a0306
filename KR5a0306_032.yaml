body:
  text: 酒客酒客者梁市上酒家人也作酒常美而售日得萬錢有過而逐之主人酒常酢敗窮貧梁市中賈人多以女妻而迎之或去或來後百餘歲來為梁丞使民益種芋菜曰三年當大飢卒如其言梁民不死五年解印綬去莫知其終焉酒客蕭綷寄沽梁肆何以標異醇醴殊味屈身佐時民用不匱解紱晨征莫知所萃
