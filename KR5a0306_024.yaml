body:
  text: 范蠡范蠡字少伯徐人也事周師太公望好服桂飲水為越大夫佐勾踐破吳後乘舟入海變名姓適齊為鴟夷子更後百餘年見於陶為陶朱君財纍億萬號陶朱公後棄之蘭陵賣藥後人世世識見之范蠡御桂心虛志遠受業師望載潛載惋龍見越鄉功遂身返屣脫千金與道舒卷
