body:
  text: 黃帝黃帝者號曰軒轅能劾百神朝而使之弱而能言聖而預知知物之紀自以為雲師有龍形自擇亡日與群臣辭至於卒還葬橋山山崩柩空無尸唯劍舄在焉仙書云黃帝采首山之銅鑄鼎於荊山之下鼎成有龍垂鬍髯下迎帝乃升天群臣百僚悉持龍髯從帝而升攀帝弓及龍髯拔而弓墜群臣不得從望帝而悲號故後世以其處為鼎湖名其弓為烏號焉神聖淵玄邈哉帝皇暫蒞萬物冠名百王化周六合數通無方假葬橋山超升昊蒼
