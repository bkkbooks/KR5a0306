body:
  text: 嘯父嘯父者冀州人也少在西周市上補履數十年人不知也後奇其不老好事者造求其術不能得也唯梁母得其作火法臨上三亮上與梁母別列數十火而升西邑多奉祀之嘯父駐形年衰不邁梁母遇之歷虛啓會丹火翼輝紫煙成蓋眇企升雲抑絶華泰
