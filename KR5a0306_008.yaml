body:
  text: 老子老子姓李名耳字伯陽陳人也生於殷時為周柱下史好養精氣貴接而不施轉為守藏史積八十餘年史記云二百餘年時稱為隱君子諡曰聃仲尼至周見老子知其聖人乃師之後周德衰乃乘青牛車去入大秦過函關關令尹喜待而迎之知真人也乃強使著書作道德經上下二卷老子無為而無不為道一生死跡入靈奇塞兑內鏡冥神絕涯德合元氣壽同兩儀
