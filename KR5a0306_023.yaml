body:
  text: 江妃二女江妃二女者不知何所人也出遊於江漢之湄逢鄭交甫見而悅之不知其神人也謂其僕曰我欲下請其佩僕曰此間之人皆習於辭不得恐罹悔焉交甫不聽遂下與之言曰二女勞矣二女曰客子有勞妾何勞之有交甫曰橘是柚也我盛之以笥令附漢水將流而下我遵其旁彩其芝而茹之以知吾為不遜願請子之佩二女曰橘是柚也我盛之以令附漢水將流而下我遵其旁彩其芝而茹之遂手解佩與交甫交甫悅受而懷之中當心趨去數十步視佩空懷無佩顧二女忽然不見靈妃豔逸時見江湄麗服微步流盻生姿交甫遇之憑情言私鳴佩虛擲絶影焉追
