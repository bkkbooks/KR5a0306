body:
  text: 子主子主者楚語而細音不知何所人也詣江都王自言寧先生雇我作客三百年不得作直以為狂人也問先生所在雲在龍眉山上王遣吏將上龍眉山巔見寧先生毛身廣耳被髮鼓琴主見之叩頭吏致王命先生曰此主吾比舍九世孫且念汝家當有暴死女子三人勿預吾事語竟大風發吏走下山比歸宮中相殺三人王遣三牲立祠焉子主挺年理有所資寧主祠秀拊琴龍眉以道相符當與訟微匡事竭力問昭我師
