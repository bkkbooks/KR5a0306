body:
  text: 鉤翼夫人鉤翼夫人者齊人也姓趙少時好清淨病臥六年右手拳屈飲食少望氣者云東北有貴人氣推而得之召到姿色甚偉武帝披其手得一玉鉤而手尋展遂幸而生昭帝後武帝害之殯屍不冷而香一月間後昭帝即位更葬之棺內但有絲履故名其宮曰鉤翼後避諱改為弋廟闈有神祠閣在焉婉婉弱媛廟符授鉤誕育嘉嗣皇祚惟休武之不達背德致仇委身受戮屍滅芳流
