body:
  text: 瑕丘仲瑕丘仲者寧人也賣藥於寧百餘年人以為壽矣地動舍壞仲及里中數十家屋臨水皆敗仲死民人取仲尸棄水中收其藥賣之仲披裘而從詣之取藥棄仲者懼叩頭求哀仲曰恨汝使人知我耳吾去矣後為夫餘胡王驛使復來至寧北方人謂之謫仙人焉瑕丘通玄謫脫其迹人死亦死泛焉言惜遨步觀化豈勞胡驛苟不睹本誰知其謫
