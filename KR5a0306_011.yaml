body:
  text: 呂尚呂尚者冀州人也生而內智預見存亡避紂之亂隱於遼東四十年適西周匿於南山釣於溪三年不獲魚比閭皆曰可已矣尚曰非爾所及也已而果得兵鈐於魚腹中文王夢得聖人聞尚遂載而歸至武王伐紂嘗作陰謀百餘篇服澤芝地髓具二百年而告亡有難而不葬後子葬之無屍唯有玉鈐六篇在棺中云呂尚隱釣瑞得赬鱗通夢西伯同乘入臣沈謀籍世芝體煉身遠代所稱美哉天人
