body:
  text: 溪父溪父者南郡鄘人也居山間有仙人常止其家從買瓜教之煉瓜子與桂附子芷實共藏而對分食之二十餘年能飛走升山入水後百餘年居絶山頂呼溪下父老與道平生時事云溪父何欲欲在幽谷下臨清澗上翳委蓐仙客舍之導以祕篆形絶埃心在舊俗
